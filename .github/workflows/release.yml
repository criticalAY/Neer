# Manual release workflow for Neer.
#
# Triggered from the Actions tab → "Release" → "Run workflow". Collects the
# version parts + release type, computes the versionCode per the app's scheme
# (AbbCCtDD), builds a release APK (signed with the keystore from secrets
# if configured, otherwise the debug key as a fallback), tags the commit,
# and publishes a GitHub Release with the APK attached. Alpha and beta
# releases are marked as pre-release.
#
# Required repo secrets for production signing (optional — skip for debug-
# signed APKs):
#   SIGNING_KEY         — base64-encoded contents of your .jks keystore file
#   KEYSTORE_PASSWORD   — keystore password
#   KEY_ALIAS           — signing key alias
#   KEY_PASSWORD        — signing key password

name: Release

on:
  workflow_dispatch:
    inputs:
      major:
        description: "Major version (1 digit)"
        type: string
        default: "1"
      minor:
        description: "Minor version (2 digits, zero-padded)"
        type: string
        default: "03"
      patch:
        description: "Patch / maintenance version (2 digits, zero-padded)"
        type: string
        default: "00"
      release_type:
        description: "Release type"
        type: choice
        options:
          - alpha
          - beta
          - stable
        default: alpha
      build:
        description: "Alpha/beta build number (ignored for stable)"
        type: string
        default: "1"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Compute version fields
        id: v
        shell: bash
        run: |
          MAJOR="${{ inputs.major }}"
          MINOR="${{ inputs.minor }}"
          PATCH="${{ inputs.patch }}"
          TYPE="${{ inputs.release_type }}"
          BUILD="${{ inputs.build }}"

          # Zero-pad minor/patch/build to the widths required by the versionCode scheme.
          MINOR=$(printf "%02d" "$((10#$MINOR))")
          PATCH=$(printf "%02d" "$((10#$PATCH))")

          case "$TYPE" in
            alpha)
              T_DIGIT=1
              BUILD_PAD=$(printf "%02d" "$((10#$BUILD))")
              VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}alpha${BUILD}"
              ;;
            beta)
              T_DIGIT=2
              BUILD_PAD=$(printf "%02d" "$((10#$BUILD))")
              VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}beta${BUILD}"
              ;;
            stable)
              T_DIGIT=3
              BUILD_PAD="00"
              VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}"
              ;;
            *)
              echo "::error::Unknown release type '$TYPE'"
              exit 1
              ;;
          esac

          VERSION_CODE="${MAJOR}${MINOR}${PATCH}${T_DIGIT}${BUILD_PAD}"
          TAG="v${VERSION_NAME}"

          if [ "$TYPE" = "stable" ]; then
            PRERELEASE=false
          else
            PRERELEASE=true
          fi

          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                   >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE"     >> "$GITHUB_OUTPUT"

          echo "Building $TAG (versionCode=$VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        id: keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        shell: bash
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::warning::SIGNING_KEY secret is not set — building with debug key."
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$SIGNING_KEY" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -PversionCode=${{ steps.v.outputs.version_code }} \
            -PversionName=${{ steps.v.outputs.version_name }}

      - name: Collect APK
        id: apk
        shell: bash
        run: |
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_SRC" ]; then
            echo "::error::No release APK produced"
            exit 1
          fi
          APK_DEST="neer-${{ steps.v.outputs.version_name }}.apk"
          cp "$APK_SRC" "$APK_DEST"
          echo "path=$APK_DEST" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.v.outputs.tag }}" \
            -m "Release ${{ steps.v.outputs.version_name }} (versionCode ${{ steps.v.outputs.version_code }})"
          git push origin "${{ steps.v.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: Neer ${{ steps.v.outputs.version_name }}
          prerelease: ${{ steps.v.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
